name: Sync Docs to Selvo
on:
  push:
    branches: [main]
    paths:
      - 'docs/help-center/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @selvo/cli
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          max_turns: 15
          allowed_tools: "Read,Glob,Grep,Bash"
          prompt: |
            Files changed in docs/help-center/:
            ${{ steps.changed.outputs.files }}

            For each changed markdown file:
            1. Read the file content
            2. Search for an existing article: `selvo articles search "<title>" --json`
            3. If found, update it: `selvo articles update <id> --file <path>`
            4. If not found, create as draft: `selvo articles create --title "..." --collection <id> --file <path> --status draft --json`

            Use the Selvo CLI. Create articles as drafts.
        env:
          SELVO_API_KEY: ${{ secrets.SELVO_API_KEY }}
