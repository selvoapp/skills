name: Changelog to Help Center
on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @selvo/cli
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          max_turns: 10
          allowed_tools: "Read,Bash,Write"
          prompt: |
            A new release was published:
            Tag: ${{ github.event.release.tag_name }}
            Name: ${{ github.event.release.name }}
            Body:
            <release-body>
            ${{ github.event.release.body }}
            </release-body>

            Using the Selvo CLI:
            1. Find or create a "What's New" collection: `selvo collections list --json`
               If none exists: `selvo collections create --name "What's New" --icon "lucide:sparkles" --json`
            2. Write a help center article summarizing this release to a temp file
            3. Create it: `selvo articles create --title "..." --collection <id> --file <path> --status draft --json`
            4. Write for customers, not developers — no jargon
            5. Save as draft for human review
        env:
          SELVO_API_KEY: ${{ secrets.SELVO_API_KEY }}
